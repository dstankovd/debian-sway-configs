[font]
normal = { family = "Cascadia Mono", style = "Regular" }
bold   = { family = "Cascadia Mono", style = "Bold" }
italic = { family = "Cascadia Mono", style = "Italic" }
size   = 11.0

[window]
padding = { x = 12, y = 12 }
decorations = "None"
opacity = 0.95

[cursor]
style = { shape = "Beam", blinking = "On" }

[mouse]
hide_when_typing = true

[selection]
save_to_clipboard = true

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"

[colors.primary]
background = "#${BASE}"
foreground = "#${TEXT}"

[colors.cursor]
text   = "#${BASE}"
cursor = "#${ACCENT}"

[colors.selection]
text       = "#${BASE}"
background = "#${ACCENT}"

# ANSI colors — same across all themes
[colors.normal]
black   = "#1C1B1A"
red     = "#AF3029"
green   = "#66800B"
yellow  = "#AD8301"
blue    = "#205EA6"
magenta = "#A02F6F"
cyan    = "#24837B"
white   = "#CECDC3"

[colors.bright]
black   = "#403E3C"
red     = "#D14D41"
green   = "#879A39"
yellow  = "#D0A215"
blue    = "#4385BE"
magenta = "#CE5D97"
cyan    = "#3AA99F"
white   = "#E6E4D9"
