[font]
normal = { family = "Cascadia Mono", style = "Regular" }
bold   = { family = "Cascadia Mono", style = "Bold" }
italic = { family = "Cascadia Mono", style = "Italic" }
size   = 11.0

[window]
padding = { x = 12, y = 12 }
decorations = "None"
opacity = 0.95

[cursor]
style = { shape = "Beam", blinking = "On" }

[mouse]
hide_when_typing = true

[selection]
save_to_clipboard = true

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"

[colors.primary]
background = "#${BASE}"
foreground = "#${TEXT}"

[colors.cursor]
text   = "#${BASE}"
cursor = "#${ACCENT}"

[colors.selection]
text       = "#${BASE}"
background = "#${ACCENT}"

# ANSI colors
[colors.normal]
black   = "#${COLOR0}"
red     = "#${COLOR1}"
green   = "#${COLOR2}"
yellow  = "#${COLOR3}"
blue    = "#${COLOR4}"
magenta = "#${COLOR5}"
cyan    = "#${COLOR6}"
white   = "#${COLOR7}"

[colors.bright]
black   = "#${COLOR8}"
red     = "#${COLOR9}"
green   = "#${COLOR10}"
yellow  = "#${COLOR11}"
blue    = "#${COLOR12}"
magenta = "#${COLOR13}"
cyan    = "#${COLOR14}"
white   = "#${COLOR15}"
