[main]
font=Cascadia Mono:size=11
pad=12x12 center
selection-target=clipboard

[cursor]
style=beam
blink=yes

[mouse]
hide-when-typing=yes

[colors]
background=${BASE}
foreground=${TEXT}

selection-foreground=${BASE}
selection-background=${ACCENT}

# ANSI colors — same across all themes
# Black
regular0=1C1B1A
bright0=403E3C

# Red
regular1=AF3029
bright1=D14D41

# Green
regular2=66800B
bright2=879A39

# Yellow (accent)
regular3=AD8301
bright3=D0A215

# Blue
regular4=205EA6
bright4=4385BE

# Magenta
regular5=A02F6F
bright5=CE5D97

# Cyan
regular6=24837B
bright6=3AA99F

# White
regular7=CECDC3
bright7=E6E4D9
