# Starship prompt configuration
# Uses terminal palette colors — automatically matches the active sway theme.
# Install: sudo apt install starship

format = """
$directory\
$git_branch\
$git_status\
$cmd_duration\
$line_break\
$character"""

add_newline = true

# =============================================================================
# Prompt character
# =============================================================================

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold yellow)"

# =============================================================================
# Directory
# =============================================================================

[directory]
style             = "bold cyan"
truncation_length = 4
truncate_to_repo  = true
read_only         = " 󰌾"
home_symbol       = "~"

# =============================================================================
# Git
# =============================================================================

[git_branch]
format = "[ $symbol$branch(:$remote_branch)]($style) "
style  = "bold yellow"
symbol = " "

[git_status]
format    = "([$all_status$ahead_behind]($style) )"
style     = "bold red"
conflicted = "󰩌 "
ahead      = "⇡${count} "
behind     = "⇣${count} "
diverged   = "⇕⇡${ahead_count}⇣${behind_count} "
untracked  = "? "
stashed    = "󰏗 "
modified   = "~ "
staged     = "+ "
renamed    = "» "
deleted    = "✘ "

# =============================================================================
# Command duration (shows how long the last command took, if > 3s)
# =============================================================================

[cmd_duration]
min_time = 3000
format   = "[󱦟 $duration](dimmed white) "

# =============================================================================
# Disable modules we don't need (keeps prompt fast)
# =============================================================================

[aws]
disabled = true

[gcloud]
disabled = true

[azure]
disabled = true

[package]
disabled = true
